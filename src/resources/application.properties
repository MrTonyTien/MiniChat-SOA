# ================================================
# MINI CHAT v2.0 — CẤU HÌNH ỨNG DỤNG
# ================================================
# 
# Cách hoạt động:
# - Các giá trị ở đây là GIÁ TRỊ MẶC ĐỊNH
# - Có thể override bằng Environment Variable
# - Ví dụ: set SERVER_PORT=8080 sẽ ghi đè server.port=6789
#
# Quy tắc đặt tên ENV từ property key:
# server.port       → SERVER_PORT
# db.url            → DB_URL
# (Viết hoa, thay dấu chấm bằng gạch dưới)
# ================================================

# -------- CẤU HÌNH SERVER --------
# Cổng server lắng nghe kết nối
server.port=6789

# Số luồng tối đa trong Thread Pool
# Mỗi luồng phục vụ 1 client
# 50 luồng × ~1MB/luồng = ~50MB RAM
server.thread.pool.size=50

# -------- CẤU HÌNH DATABASE --------
# URL kết nối H2 Database
# AUTO_SERVER=TRUE: cho phép nhiều process kết nối cùng lúc
db.url=jdbc:h2:./data/minichat_db;AUTO_SERVER=TRUE

# Tên đăng nhập database
db.user=sa

# Mật khẩu database
# QUAN TRỌNG: Trong production, đọc từ ENV thay vì để ở đây
# Để trống vì đây là môi trường dev/test
db.password=

# -------- CẤU HÌNH CLIENT --------
# Địa chỉ server mà client kết nối đến
# Đổi thành IP thực nếu server ở máy khác
client.host=localhost

# Cổng client kết nối đến (phải khớp với server.port)
client.port=6789

# -------- CẤU HÌNH SSL (DEMO) --------
# Cổng cho SSL server (demo)
ssl.port=6790

# Đường dẫn đến file keystore chứa certificate
ssl.keystore.path=/minichat.jks

# Mật khẩu keystore
# QUAN TRỌNG: Trong production đọc từ ENV
ssl.keystore.password=minichat123